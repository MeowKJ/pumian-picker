name: Build desktop apps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: pnpm dist:win
          - name: macOS arm64
            os: macos-latest
            command: pnpm dist:mac
          - name: Linux x64
            os: ubuntu-latest
            command: pnpm dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect macOS signing identity
        if: runner.os == 'macOS'
        run: bash scripts/find-mac-signing.sh

      - name: Expose macOS signing secrets
        if: runner.os == 'macOS' && secrets.CSC_LINK != ''
        run: |
          echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Typecheck
        run: pnpm typecheck

      - name: Build package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pumian-picker-${{ matrix.name }}
          path: |
            release/**
            !release/**/*.blockmap
          if-no-files-found: error
