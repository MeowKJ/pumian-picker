name: Build desktop apps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: pnpm dist:win
          - name: macOS arm64
            os: macos-latest
            command: pnpm dist:mac
          - name: Linux x64
            os: ubuntu-latest
            command: pnpm dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect macOS signing identity
        if: runner.os == 'macOS'
        run: bash scripts/find-mac-signing.sh

      - name: Expose macOS signing secrets
        if: runner.os == 'macOS'
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK_SECRET" ]; then
            echo "CSC_LINK=$CSC_LINK_SECRET" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Build package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pumian-picker-${{ matrix.name }}
          path: |
            release/**
            !release/**/*.blockmap
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: build-${{ github.run_number }}
        run: |
          mapfile -d '' files < <(find release-artifacts -type f ! -name '*.blockmap' -print0)
          gh release create "$TAG_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "铺面拔取器 自动构建 ${{ github.run_number }}" \
            --notes "自动构建产物：Windows x64、macOS arm64、Linux x64。"
